# nginx du front ToutPharma : sert la SPA et proxifie l'API.
# Un seul port exposé, pas de CORS, les liens PDF publics passent par ici.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads d'ordonnances (photos) jusqu'à 6 Mo
    client_max_body_size 6m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API → backend (nom du service docker-compose)
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images produits / ordonnances / PDF de commandes → backend
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets fingerprintés : cache long
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html jamais mis en cache : les clients voient la nouvelle version
    # dès le déploiement (les assets fingerprintés, eux, restent cachés 30 j).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA : toute route inconnue renvoie index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
